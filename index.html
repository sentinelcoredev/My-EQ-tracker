<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern EQ Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent: #bb86fc;
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
            --danger: #cf6679;
            --success: #03dac6;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        h1 { text-align: center; color: var(--accent); margin-bottom: 30px; }

        /* Stats Section */
        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--success);
        }

        .stat-label { color: var(--text-dim); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }

        /* Calendar Styling */
        .calendar-box {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .weekday {
            text-align: center;
            color: var(--accent);
            font-weight: bold;
            padding-bottom: 10px;
        }

        .day {
            aspect-ratio: 1 / 1;
            background: #2a2a2a;
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid transparent;
        }

        .day:hover { border-color: var(--accent); background: #333; }
        .day.selected { border-color: var(--accent); background: #3d3d3d; }

        .day-num { font-size: 0.9rem; color: var(--text-dim); }
        .day-score {
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            color: var(--accent);
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        button {
            padding: 12px 25px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-delete { background: var(--danger); color: white; }
        .btn-delete:hover { opacity: 0.8; }

        /* Graph Box */
        .graph-box {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            height: 400px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>EQ Tracker</h1>

    <div class="stats-container">
        <div class="stat-card">
            <div id="avg-week" class="stat-value">0.0</div>
            <div class="stat-label">Weekly Average EQ</div>
        </div>
        <div class="stat-card">
            <div id="avg-overall" class="stat-value">0.0</div>
            <div class="stat-label">Overall Average EQ</div>
        </div>
    </div>

    <div class="calendar-box">
        <div class="calendar-header">
            <h2 id="monthDisplay">Month Year</h2>
        </div>
        <div class="calendar-grid" id="calendarGrid">
            </div>
    </div>

    <div class="controls">
        <button class="btn-delete" onclick="deleteScore()">🗑️ Delete Selected Data</button>
    </div>

    <div class="graph-box">
        <canvas id="eqChart"></canvas>
    </div>
</div>

<script>
    let currentData = JSON.parse(localStorage.getItem('eqData')) || {};
    let selectedDate = null;
    let myChart;

    const monthNames = ["January", "February", "March", "April", "May", "June",
        "July", "August", "September", "October", "November", "December"];

    function init() {
        renderCalendar();
        updateStats();
        initChart();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const monthDisplay = document.getElementById('monthDisplay');
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth();

        monthDisplay.innerText = `${monthNames[month]} ${year}`;
        grid.innerHTML = '';

        // Add Weekday Headers
        ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].forEach(d => {
            const div = document.createElement('div');
            div.className = 'weekday';
            div.innerText = d;
            grid.appendChild(div);
        });

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        // Padding for first day
        for (let i = 0; i < firstDay; i++) {
            grid.appendChild(document.createElement('div'));
        }

        // Create Days
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${year}-${month + 1}-${d}`;
            const dayEl = document.createElement('div');
            dayEl.className = 'day';
            if (selectedDate === dateStr) dayEl.classList.add('selected');
            
            const score = currentData[dateStr] !== undefined ? currentData[dateStr] : '';
            
            dayEl.innerHTML = `
                <span class="day-num">${d}</span>
                <span class="day-score">${score}</span>
            `;

            dayEl.onclick = () => selectDay(dateStr);
            grid.appendChild(dayEl);
        }
    }

    function selectDay(dateStr) {
        selectedDate = dateStr;
        renderCalendar();
        
        const val = prompt("Enter EQ Score (-10 to 10):", currentData[dateStr] || "");
        if (val !== null) {
            const num = parseFloat(val);
            if (!isNaN(num) && num >= -10 && num <= 10) {
                currentData[dateStr] = num;
                saveData();
            } else if (val === "") {
                delete currentData[dateStr];
                saveData();
            } else {
                alert("Please enter a valid number between -10 and 10.");
            }
        }
    }

    function deleteScore() {
        if (selectedDate && currentData[selectedDate] !== undefined) {
            if (confirm(`Delete score for ${selectedDate}?`)) {
                delete currentData[selectedDate];
                saveData();
            }
        } else {
            alert("Please click a date on the calendar first!");
        }
    }

    function saveData() {
        localStorage.setItem('eqData', JSON.stringify(currentData));
        renderCalendar();
        updateStats();
        updateChart();
    }

    function updateStats() {
        const scores = Object.values(currentData);
        if (scores.length === 0) {
            document.getElementById('avg-overall').innerText = "0.0";
            document.getElementById('avg-week').innerText = "0.0";
            return;
        }

        // Overall Average
        const overallAvg = scores.reduce((a, b) => a + b, 0) / scores.length;
        document.getElementById('avg-overall').innerText = overallAvg.toFixed(1);

        // Weekly Average (Last 7 entries or records within last 7 days)
        // For simplicity, we'll average the last 7 logged entries
        const last7 = scores.slice(-7);
        const weeklyAvg = last7.reduce((a, b) => a + b, 0) / last7.length;
        document.getElementById('avg-week').innerText = weeklyAvg.toFixed(1);
    }

    function initChart() {
        const ctx = document.getElementById('eqChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], // No dates, will use indices
                datasets: [{
                    label: 'EQ Score',
                    data: [],
                    borderColor: '#bb86fc',
                    backgroundColor: 'rgba(187, 134, 252, 0.2)',
                    tension: 0.4,
                    fill: true,
                    pointRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { min: -10, max: 10, grid: { color: '#333' } },
                    x: { display: true, grid: { display: false }, ticks: { color: '#a0a0a0' } }
                },
                plugins: {
                    legend: { display: false }
                }
            }
        });
        updateChart();
    }

    function updateChart() {
        // Sort keys by date to ensure the graph flows correctly
        const sortedDates = Object.keys(currentData).sort((a, b) => new Date(a) - new Date(b));
        const values = sortedDates.map(date => currentData[date]);
        
        // Use generic "Day 1, Day 2..." labels as requested
        myChart.data.labels = values.map((_, i) => `Entry ${i + 1}`);
        myChart.data.datasets[0].data = values;
        myChart.update();
    }

    init();
</script>

</body>
  </html>

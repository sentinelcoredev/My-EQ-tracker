<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuantX EQ Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --accent: #6366f1;
  --green: #22c55e;
  --text: #e2e8f0;
  --muted: #94a3b8;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: var(--text);
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.navbar {
  background: rgba(15,23,42,0.8);
  padding: 15px 20px;
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.card {
  background: rgba(30,41,59,0.7);
  border-radius: 16px;
  padding: 20px;
  margin-top: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

input, select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  background: #0f172a;
  color: white;
}

button {
  margin-top: 15px;
  background: var(--accent);
  border: none;
  padding: 10px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

.stats {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.stat-box {
  flex: 1;
  background: var(--card);
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

.stat-box h3 {
  margin: 0;
  color: var(--green);
}

table {
  width: 100%;
  margin-top: 10px;
  border-collapse: collapse;
}

td, th {
  padding: 8px;
  text-align: center;
}

</style>
</head>

<body>

<div class="navbar">
  <h2>QuantX EQ Tracker</h2>
</div>

<div class="container">

<div class="card">
  <h3>Add Study Entry</h3>
  <input type="date" id="date">
  <input type="number" id="hours" placeholder="Study Hours">
  <input type="number" id="score" placeholder="Score (%)">
  <button onclick="addEntry()">Add Entry</button>
</div>

<div class="card stats">
  <div class="stat-box">
    <p>Total Days</p>
    <h3 id="days">0</h3>
  </div>
  <div class="stat-box">
    <p>Avg Score</p>
    <h3 id="avg">0%</h3>
  </div>
  <div class="stat-box">
    <p>Total Hours</p>
    <h3 id="totalHours">0</h3>
  </div>
</div>

<div class="card">
  <h3>Performance Chart</h3>
  <canvas id="chart"></canvas>
</div>

<div class="card">
  <h3>History</h3>
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Hours</th>
        <th>Score</th>
      </tr>
    </thead>
    <tbody id="tableData"></tbody>
  </table>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("eqData")) || [];

function saveData() {
  localStorage.setItem("eqData", JSON.stringify(data));
}

function addEntry() {
  const date = document.getElementById("date").value;
  const hours = document.getElementById("hours").value;
  const score = document.getElementById("score").value;

  if (!date || !hours || !score) return alert("Fill all fields");

  data.push({ date, hours: Number(hours), score: Number(score) });
  saveData();
  render();
}

function render() {
  const table = document.getElementById("tableData");
  table.innerHTML = "";

  let totalScore = 0;
  let totalHours = 0;

  data.forEach(d => {
    totalScore += d.score;
    totalHours += d.hours;

    table.innerHTML += `
      <tr>
        <td>${d.date}</td>
        <td>${d.hours}</td>
        <td>${d.score}%</td>
      </tr>
    `;
  });

  document.getElementById("days").innerText = data.length;
  document.getElementById("avg").innerText = data.length ? (totalScore / data.length).toFixed(1) + "%" : "0%";
  document.getElementById("totalHours").innerText = totalHours;

  drawChart();
}

let chart;

function drawChart() {
  const ctx = document.getElementById("chart").getContext("2d");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: data.map(d => d.date),
      datasets: [{
        label: "Score %",
        data: data.map(d => d.score),
        borderWidth: 2,
        tension: 0.3
      }]
    }
  });
}

render();
</script>

</body>
</html>
